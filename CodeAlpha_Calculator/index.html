<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector core | Simple Calculator </title>
    <link rel="stylesheet" href="design.css">
</head>
<body>
    <div class="calculator-card">
        <div class="header-logo">VECTOR <span class="pro-tag">CORE</span></div>
        
        <div class="display-section">
            <div id="history-row">SYSTEM READY</div>
            <div id="main-display">0</div>
        </div>

        <div class="button-grid">
            <button class="btn btn-sci" onclick="appendSci('sqrt', '√(')">√</button>
            <button class="btn btn-sci" onclick="appendSci('pow', '^2')">x²</button>
            <button class="btn btn-control" onclick="clearDisplay()">AC</button>
            <button class="btn btn-control" onclick="deleteLast()">DEL</button>
            <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>

            <button class="btn btn-sci" onclick="appendSci('sin', 'sin(')">sin</button>
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="appendOperator('*')">×</button>

            <button class="btn btn-sci" onclick="appendSci('cos', 'cos(')">cos</button>
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('-')">−</button>

            <button class="btn btn-sci" onclick="appendSci('log', 'log(')">log</button>
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

            <button class="btn btn-sci" onclick="appendNumber('3.14159')">π</button>
            <button class="btn" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
            <button class="btn btn-sci" onclick="appendNumber(')')">)</button>
            <button class="btn btn-equal" onclick="calculate()">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
